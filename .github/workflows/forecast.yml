name: Fog Forecast

on:
  schedule:
    # Run every hour at :30 past — gives HRRR ~30min after the model run hour
    # to finish publishing all forecast hours (fxx=10-12 are published last).
    - cron: "30 * * * *"
  workflow_dispatch:   # manual trigger from GitHub UI for testing

# Cancel any in-progress run when a new one starts — prevents job queue buildup
# if a run takes longer than expected (e.g., HRRR data delayed).
concurrency:
  group: forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-22.04
    timeout-minutes: 45   # hard cap — prevents hung jobs from blocking future runs
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get install -y wgrib2
          pip install -r requirements.txt
          # nvidia-nccl-cu12 is pulled in by the xgboost GPU wheel and segfaults
          # on CPU-only runners during dynamic library loading (before Python even starts).
          # Replace with the CPU-only build in the same step so it cannot be skipped.
          pip uninstall -y xgboost nvidia-nccl-cu12 || true
          pip install xgboost-cpu==2.1.4

      - name: Verify xgboost and nccl state
        run: |
          python3 -c "import xgboost; print('xgboost:', xgboost.__version__)"
          python3 -c "import nvidia_nccl_cu12; print('ERROR: nccl still installed')" 2>/dev/null || echo "OK: nvidia-nccl-cu12 not present"

      - name: Run forecast pipeline
        env:
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
          HRRR_CACHE_DIR:        /tmp/hrrr_cache
          PYTHONFAULTHANDLER:    "1"
        run: python3 scripts/run_live_forecast.py

