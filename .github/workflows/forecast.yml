name: Fog Forecast

on:
  schedule:
    # Run every hour at :30 past — gives HRRR ~30min after the model run hour
    # to finish publishing all forecast hours (fxx=10-12 are published last).
    - cron: "30 * * * *"
  workflow_dispatch:   # manual trigger from GitHub UI for testing

# Cancel any in-progress run when a new one starts — prevents job queue buildup
# if a run takes longer than expected (e.g., HRRR data delayed).
concurrency:
  group: forecast
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # hard cap — prevents hung jobs from blocking future runs
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Replace xgboost GPU build with CPU-only
        # xgboost's Linux wheel pulls in nvidia-nccl-cu12 which segfaults on
        # CPU-only runners when predict_proba() is first called (lazy CUDA init).
        # Must uninstall both xgboost AND nccl before installing xgboost-cpu,
        # because pip leaves orphaned dependencies behind.
        run: |
          pip uninstall -y xgboost nvidia-nccl-cu12 || true
          pip install xgboost-cpu==2.1.4

      - name: Run forecast pipeline
        env:
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
          HRRR_CACHE_DIR:        /tmp/hrrr_cache
        run: python3 scripts/run_live_forecast.py

